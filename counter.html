<!DOCTYPE html>
<html>
<head>
<title>Simple Counter</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff6a00,#ee0979);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.2);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}
.number{
    font-size:70px;
    font-weight:bold;
    margin:20px 0;
    transition:0.3s;
}
button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}
.plus{background:#00c853;color:white;}
.minus{background:#d50000;color:white;}
.reset{background:#2962ff;color:white;}
a{
    display:block;
    margin-top:20px;
    color:white;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App(){
    const [count,setCount] = React.useState(0);

    return(
        <div className="card">
            <h2>➕ Simple Counter</h2>

            <div className="number">
                {count}
            </div>

            <div>
                <button className="minus" onClick={()=>setCount(count-1)}>-</button>
                <button className="reset" onClick={()=>setCount(0)}>Reset</button>
                <button className="plus" onClick={()=>setCount(count+1)}>+</button>
            </div>

            <a href="index.html">⬅ Kembali</a>
        </div>
    )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
