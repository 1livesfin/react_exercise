<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator Tabung</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #0072ff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0072ff;
      color: white;
      transform: scale(1.05);
    }

    .hasil {
      margin-top: 20px;
      text-align: left;
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
      animation: slideUp 0.5s ease;
    }

    .hasil p {
      margin: 8px 0;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes slideUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [jari, setJari] = React.useState("");
      const [tinggi, setTinggi] = React.useState("");
      const [hasil, setHasil] = React.useState(null);

      const hitungTabung = () => {
        const r = parseFloat(jari);
        const t = parseFloat(tinggi);

        if (isNaN(r) || isNaN(t) || r <= 0 || t <= 0) {
          alert("Masukkan angka yang valid!");
          return;
        }

        const volume = Math.PI * r * r * t;
        const luasPermukaan = 2 * Math.PI * r * (r + t);

        setHasil({
          volume: volume.toFixed(2),
          luasPermukaan: luasPermukaan.toFixed(2)
        });
      };

      return (
        <div className="card">
          <h2>🛢️ Kalkulator Tabung</h2>

          <input
            type="number"
            placeholder="Jari-jari"
            value={jari}
            onChange={(e) => setJari(e.target.value)}
          />

          <input
            type="number"
            placeholder="Tinggi"
            value={tinggi}
            onChange={(e) => setTinggi(e.target.value)}
          />

          <button onClick={hitungTabung}>Hitung</button>

          {hasil && (
            <div className="hasil">
              <p>📦 Volume: {hasil.volume}</p>
              <p>📐 Luas Permukaan: {hasil.luasPermukaan}</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
