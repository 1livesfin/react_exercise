<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator Kubus Keren</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #0077ff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0077ff;
      color: white;
      transform: scale(1.05);
    }

    .hasil {
      margin-top: 20px;
      text-align: left;
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
      animation: slideUp 0.5s ease;
    }

    .hasil p {
      margin: 8px 0;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes slideUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [sisi, setSisi] = React.useState("");
      const [hasil, setHasil] = React.useState(null);

      const hitungKubus = () => {
        const s = parseFloat(sisi);

        if (isNaN(s) || s <= 0) {
          alert("Masukkan angka yang valid!");
          return;
        }

        const volume = s ** 3;
        const luasPermukaan = 6 * (s ** 2);
        const kelilingRusuk = 12 * s;

        setHasil({
          volume,
          luasPermukaan,
          kelilingRusuk
        });
      };

      return (
        <div className="card">
          <h2>🧊 Kalkulator Kubus</h2>

          <input
            type="number"
            placeholder="Masukkan panjang sisi"
            value={sisi}
            onChange={(e) => setSisi(e.target.value)}
          />

          <button onClick={hitungKubus}>Hitung</button>

          {hasil && (
            <div className="hasil">
              <p>📦 Volume: {hasil.volume}</p>
              <p>📐 Luas Permukaan: {hasil.luasPermukaan}</p>
              <p>📏 Keliling Rusuk: {hasil.kelilingRusuk}</p>
            </div>
          )}
          <div>
            <a href="index.html">⬅ Kembali</a>
          </div>
        </div>
        
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
